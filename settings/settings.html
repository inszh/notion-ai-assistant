<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title data-i18n="settingsTitle"></title>
  <style>
    body { width: 340px; background: #0d1117; color: #e2e5ee; font-family: 'PingFang SC', system-ui, sans-serif; padding: 16px; margin: 0; }
    .hd { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
    .hd-title { font-size: 16px; font-weight: bold; color: #38bdf8; }
    .user-link { font-size: 12px; color: #94a3b8; text-decoration: none; transition: color 0.2s; }
    .user-link:hover { color: #ff2442; }
    .field { margin-bottom: 15px; }
    .label { font-size: 12px; color: #94a3b8; margin-bottom: 5px; display: block; }
    input { width: 100%; padding: 8px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; color: #fff; font-size: 13px; box-sizing: border-box; }
    input:focus { border-color: #38bdf8; outline: none; }
    .save-btn { width: 100%; padding: 10px; background: #38bdf8; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .save-btn:hover { background: #0ea5e9; }
    /* 之前漏掉的提示文字样式 */
    .saved-msg { color: #10b981; font-size: 12px; text-align: center; margin-top: 8px; display: none; }
    .saved-msg.show { display: block; }
  </style>
</head>
<body>

<div class="hd">
  <div class="hd-title" data-i18n="aiHeader"></div>
  <a href="https://xhslink.com/m/16xjFq87q7b" target="_blank" class="user-link" data-i18n="userName"></a>
</div>

<div class="field">
  <label class="label" data-i18n="apiKeyLabel"></label>
  <input type="password" id="apiKey" data-i18n-attr="placeholder|placeholderKey">
</div>

<div class="field">
  <label class="label" data-i18n="modelLabel"></label>
  <input type="text" id="customModel" data-i18n-attr="placeholder|placeholderModel">
</div>

<button class="save-btn" id="saveBtn" data-i18n="saveBtn"></button>
<div id="saved" class="saved-msg" data-i18n="saveSuccess"></div>

<script src="settings.js"></script>
</body>
</html>
